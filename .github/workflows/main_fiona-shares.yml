name: 'Build and deploy Python app to Azure Web App: fiona-shares'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create deployment zip
      run: |
        zip -r deploy.zip . \
          --exclude "*.git*" \
          --exclude "__pycache__/*" \
          --exclude "*.pyc" \
          --exclude "deploy.zip" \
          --exclude "*.zip"

    - name: Deploy via Kudu (async with Oryx build)
      run: |
        # Submit async deployment - returns 202 immediately, builds in background
        response=$(curl -s -w "\n%{http_code}" -X POST \
          "https://fiona-shares.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
          --header "Authorization: Basic ${{ secrets.AZURE_SCM_B64 }}" \
          --header "Content-Type: application/zip" \
          --data-binary @deploy.zip)
        status=$(echo "$response" | tail -1)
        echo "Submit status: $status"
        if [ "$status" != "202" ] && [ "$status" != "200" ]; then
          echo "Deploy submission failed"
          exit 1
        fi

    - name: Wait for deployment to complete
      run: |
        for i in $(seq 1 30); do
          sleep 10
          result=$(curl -s \
            "https://fiona-shares.scm.azurewebsites.net/api/deployments/latest" \
            --header "Authorization: Basic ${{ secrets.AZURE_SCM_B64 }}")
          status=$(echo "$result" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          msg=$(echo "$result" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status_text','...'))" 2>/dev/null || echo "...")
          echo "[$i] status=$status $msg"
          # status 4 = success, status 3 = failed
          if [ "$status" = "4" ]; then echo "Deployment succeeded!"; exit 0; fi
          if [ "$status" = "3" ]; then echo "Deployment failed!"; exit 1; fi
        done
        echo "Timed out waiting for deployment"
        exit 1
