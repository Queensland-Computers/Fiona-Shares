name: 'Build and deploy Python app to Azure Web App: fiona-shares'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Deploy to Azure via git push (Oryx builds packages automatically)
      run: |
        # URL-encode the $ in the username
        ENCODED_USER=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${{ secrets.AZURE_GIT_USER }}")
        ENCODED_PASS=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${{ secrets.AZURE_GIT_PASS }}")
        git remote add azure "https://${ENCODED_USER}:${ENCODED_PASS}@fiona-shares.scm.azurewebsites.net/fiona-shares.git"
        git push azure HEAD:master --force
