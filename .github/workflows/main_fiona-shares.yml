name: 'Build and deploy Python app to Azure Web App: fiona-shares'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Deploy to Azure via git push (Oryx builds packages automatically)
      env:
        GIT_USER: ${{ secrets.AZURE_GIT_USER }}
        GIT_PASS: ${{ secrets.AZURE_GIT_PASS }}
      run: |
        ENCODED_USER=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['GIT_USER'],safe=''))")
        ENCODED_PASS=$(python3 -c "import urllib.parse,os; print(urllib.parse.quote(os.environ['GIT_PASS'],safe=''))")
        git remote add azure "https://${ENCODED_USER}:${ENCODED_PASS}@fiona-shares.scm.azurewebsites.net/fiona-shares.git"
        git push azure HEAD:master --force
