name: 'Build and deploy Python app to Azure Web App: fiona-shares'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python version
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies into package folder
      run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

    - name: Create deployment zip
      run: |
        zip -r deploy.zip . \
          --exclude "*.git*" \
          --exclude "__pycache__/*" \
          --exclude "*.pyc" \
          --exclude "deploy.zip" \
          --exclude "*.zip"

    - name: Deploy via Kudu zip deploy
      run: |
        curl -X POST \
          "https://fiona-shares.scm.azurewebsites.net/api/zipdeploy" \
          --header "Authorization: Basic ${{ secrets.AZURE_SCM_B64 }}" \
          --header "Content-Type: application/zip" \
          --data-binary @deploy.zip \
          --fail \
          --show-error \
          --silent \
          -w "\nHTTP Status: %{http_code}\n"
